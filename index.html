<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>
    Domain Modeling Learning Game
  </title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

<!-- HERO IMAGE -->

<div id="heroSection">

  <img src="bg.jpg"
       id="heroImage">

</div>

<!-- INTRO -->

<div class="box"
     id="introBox">

  <h2>
    📚 Understanding Good & Bad UI
  </h2>

  <p class="introText">

    The image above compares bad and good UI.

  </p>

  <div class="uiExplanation badText">

    ❌ Bad UI:
    crowded layout, weak spacing,
    difficult navigation.

  </div>

  <div class="uiExplanation goodText">

    ✅ Good UI:
    clean spacing, hierarchy,
    better usability.

  </div>

</div>

<!-- TOPBAR -->

<div id="topbar">

  <div class="box smallBox"
       id="scoreBox">

    ⭐ Score: 0

  </div>

  <div class="box smallBox"
       id="levelBox">

    Level 1

  </div>

</div>

<!-- PROGRESS -->

<div id="progressBar">

  <div id="progressFill"></div>

</div>

<!-- LESSON PANEL -->

<div class="box"
     id="lessonPanel">

  🎮 Click Start Level 1 to begin.

</div>

<!-- PHONE -->

<div id="phone">

  <div id="notch"></div>

  <h2 class="element label"
      id="title">

    Payment

  </h2>

  <div class="element input"
       id="cardInput">

    Card Number

  </div>

  <div class="element input"
       id="nameInput">

    Card Holder

  </div>

  <div class="element ui-button"
       id="payBtn">

    PAY NOW

  </div>

</div>

<!-- LEVEL 2 -->

<div id="exerciseArea">

</div>

<!-- LEVEL 3 -->

<div id="associationArea">

  <div class="column"
       id="leftColumn">

  </div>

  <div class="column"
       id="rightColumn">

  </div>

</div>

<!-- MESSAGE -->

<div class="box"
     id="message">

  Ready to start.

</div>

<!-- BUTTONS -->

<div id="controls">

  <button id="nextBtn">

    Start Level 1

  </button>

  <button id="submitBtn">

    Submit

  </button>

</div>

<script src="script.js"></script>

</body>

</html>
